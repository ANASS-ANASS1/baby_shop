<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        header { padding: 30px; border-bottom: 2px solid #d4af37; color: #d4af37; font-size: 32px; font-weight: bold; background: #000; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 50px 10px; }
        .card { background: #111; border-radius: 25px; width: 340px; overflow: hidden; border: 1px solid #333; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: #d4af37; transform: translateY(-10px); }
        .img-box { width: 100%; height: 450px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 25px; background: #1a1a1a; flex-grow: 1; }
        .price { color: #d4af37; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .btn { background: #25d366; color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; cursor: pointer; font-size: 20px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box; }
    </style>
</head>

</html>
