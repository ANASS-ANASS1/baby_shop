<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أناقة الأطفال الصغار ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        header { padding: 30px; border-bottom: 2px solid #d4af37; color: #d4af37; font-size: 32px; font-weight: bold; background: #000; position: sticky; top: 0; z-index: 100; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 50px 10px; }
        
        .card { background: #111; border-radius: 25px; width: 340px; overflow: hidden; border: 1px solid #333; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: #d4af37; transform: translateY(-10px); }
        
        .img-box { width: 100%; height: 450px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 25px; background: #1a1a1a; border-top: 1px solid #333; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        h3 { margin: 0 0 10px 0; font-size: 1.4rem; color: #eee; }
        .price { color: #d4af37; font-size: 35px; font-weight: bold; margin-bottom: 20px; }
        
        .btn { background: #25d366; color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; cursor: pointer; font-size: 22px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box; }
    </style>
</head>
<body>

<header>أناقة الأطفال الصغار ✨</header>

<div class="container">
    
    <div class="card">
        <div class="img-box"><img src="2.jpg.jpg" alt="TARBIA DREAM"></div>
        <div class="info">
            <h3>TARBIA DREAM</h3>
            <div class="price">90 درهم</div>
            <a href="https://wa.me/212680819043" class="btn">طلب عبر واتساب ✅</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box"><img src="3.jpg.jpg" alt="Blue Blanket"></div>
        <div class="info">
            <h3>Blue Blanket</h3>
            <div class="price">90 درهم</div>
            <a href="https://wa.me/212680819043" class="btn">طلب عبر واتساب ✅</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box"><img src="55287a70-b2c0-40ca-aae9-7cfa8ac06d14.jpg" alt="Twin Asala Star"></div>
        <div class="info">
            <h3>Twin Asala Star</h3>
            <div class="price">80 درهم</div>
            <a href="https://wa.me/212680819043" class="btn">طلب عبر واتساب ✅</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box"><img src="IMG_20260331_201507.jpg" alt="Baby Kahi"></div>
        <div class="info">
            <h3>Baby Kahi</h3>
            <div class="price">80 درهم</div>
            <a href="https://wa.me/212680819043" class="btn">طلب عبر واتساب ✅</a>
        </div>
    </div>

</div>

</body>
</html>
